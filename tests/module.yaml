product:
    type: lib
    platforms: [ jvm, wasmJs ]

test-dependencies:
    - ../yass2-ktor
    - $libs.coroutines.test
    - $libs.client.cio
    - $libs.server.cio
    - $libs.server.websockets
    - $libs.kct

test-dependencies@jvm:
    - ../yass2-generate

settings:
    kotlin:
        ksp:
            processors:
                - ../yass2-generate
            processorOptions:
                yass.GenerateMode: WithExpectAndActual
