apply:
    - ../shared.module-template.yaml

product:
    type: lib
    platforms: [ jvm, js, wasmJs, linuxX64, linuxArm64 ]

dependencies:
    -   ../yass2-core: exported
    -   $libs.coroutines.core: exported

settings:
    kotlin:
        ksp:
            processors@jvm:
                - ../yass2-generate
            processorOptions:
                yass.GenerateMode: InRepository
